<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyrje</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --accent: #c8b8f8;
      --accent-dim: rgba(200,184,248,0.12);
      --text: #f0eef9;
      --muted: rgba(240,238,249,0.45);
      --input-bg: rgba(255,255,255,0.04);
      --error: #f09595;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(103,78,200,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 90%, rgba(200,184,248,0.10) 0%, transparent 70%);
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    .card {
      position: relative;
      width: min(420px, 94vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px 44px;
      animation: rise 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(200,184,248,0.15) 0%, transparent 60%) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent-dim);
      border: 1px solid rgba(200,184,248,0.25);
      display: grid;
      place-items: center;
    }

    .brand-icon svg { width: 18px; height: 18px; }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--muted);
      pointer-events: none;
      transition: stroke 0.2s;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px 13px 40px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      appearance: none;
    }

    input::placeholder { color: rgba(240,238,249,0.25); }

    input:hover { border-color: var(--border-hover); }

    input:focus {
      border-color: rgba(200,184,248,0.5);
      background: rgba(200,184,248,0.06);
    }

    input:focus + svg,
    .input-wrap:focus-within svg { stroke: var(--accent); }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      color: var(--muted);
      display: grid;
      place-items: center;
      transition: color 0.2s;
    }

    .toggle-pw:hover { color: var(--text); }
    .toggle-pw svg { width: 16px; height: 16px; stroke: currentColor; }

    .input-wrap input[type="password"],
    .input-wrap input.has-toggle { padding-right: 40px; }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 24px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      padding: 0;
      border-radius: 4px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .forgot {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .forgot:hover { opacity: 1; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #1a0f3a;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-primary .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(26,15,58,0.3);
      border-top-color: #1a0f3a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-primary.loading .btn-text { display: none; }
    .btn-primary.loading .spinner { display: block; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-social {
      width: 100%;
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-social:hover {
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.06);
    }

    .btn-social svg { width: 18px; height: 18px; }

    .footer-text {
      margin-top: 28px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-text a:hover { text-decoration: underline; }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 6px;
      display: none;
    }

    .field.has-error input { border-color: var(--error); }
    .field.has-error .error-msg { display: block; }
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="noise"></div>

  <div class="card" role="main">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#c8b8f8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <span class="brand-name">Lumina</span>
    </div>

    <h1>Mirë se vini<br/><em style="font-style:italic; opacity:0.7;">sërish.</em></h1>
    <p class="subtitle">Hyni në llogarinë tuaj për të vazhduar.</p>

    <form id="loginForm" novalidate>

      <div class="field" id="emailField">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="emri@shembull.com" autocomplete="email" class="has-toggle" />
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <p class="error-msg">Ju lutemi vendosni një email të vlefshëm.</p>
      </div>

      <div class="field" id="passwordField">
        <label for="password">Fjalëkalimi</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" class="has-toggle" />
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Trego fjalëkalimin">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p class="error-msg">Fjalëkalimi duhet të ketë të paktën 6 karaktere.</p>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" id="remember" />
          Mbaj mend
        </label>
        <a href="#" class="forgot">Harruat fjalëkalimin?</a>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">
        <span class="btn-text">Hyr</span>
        <div class="spinner"></div>
      </button>

    </form>

    <div class="divider">ose vazhdo me</div>

    <button class="btn-social" type="button">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.61z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Vazhdo me Google
    </button>

    <p class="footer-text">Nuk keni llogari? <a href="#">Regjistrohu falas</a></p>

  </div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailField = document.getElementById('emailField');
    const passwordField = document.getElementById('passwordField');
    const submitBtn = document.getElementById('submitBtn');
    const togglePw = document.getElementById('togglePw');
    const eyeIcon = document.getElementById('eyeIcon');

    const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClosed = `<line x1="1" y1="1" x2="23" y2="23"/><path d="M10.584 10.587a2 2 0 002.829 2.829"/><path d="M9.363 5.365A9.466 9.466 0 0112 5c7 0 11 7 11 7a18.013 18.013 0 01-5.144 5.144M6.157 6.157C3.234 8.012 1 11 1 11s4 7 11 7a9.466 9.466 0 005.144-1.415"/>`;

    let pwVisible = false;
    togglePw.addEventListener('click', () => {
      pwVisible = !pwVisible;
      passwordInput.type = pwVisible ? 'text' : 'password';
      eyeIcon.innerHTML = pwVisible ? eyeClosed : eyeOpen;
    });

    function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    emailInput.addEventListener('input', () => {
      if (emailField.classList.contains('has-error') && validateEmail(emailInput.value.trim()))
        emailField.classList.remove('has-error');
    });

    passwordInput.addEventListener('input', () => {
      if (passwordField.classList.contains('has-error') && passwordInput.value.length >= 6)
        passwordField.classList.remove('has-error');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      let valid = true;

      if (!validateEmail(emailInput.value.trim())) {
        emailField.classList.add('has-error');
        valid = false;
      } else {
        emailField.classList.remove('has-error');
      }

      if (passwordInput.value.length < 6) {
        passwordField.classList.add('has-error');
        valid = false;
      } else {
        passwordField.classList.remove('has-error');
      }

      if (!valid) return;

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      await new Promise(r => setTimeout(r, 1800));

      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
      submitBtn.querySelector('.btn-text').textContent = '✓ Hyrja u krye';
      submitBtn.style.background = '#7dd9b0';
    });
  </script>

</body>
</html>
